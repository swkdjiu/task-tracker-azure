<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moj Task Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        /* Elegancki, neutralny gradient tła, aby szkło miało co rozmywać */
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            color: #2c3e50; 
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }

        h1 { margin-top: 0; color: #34495e; font-weight: 600; letter-spacing: -0.5px; }

        /* PRAWDZIWE SZKŁO dla formularza dodawania */
        .add-form { 
            display: flex; gap: 12px; margin-bottom: 40px; 
            width: 100%; max-width: 700px;
            background: rgba(255, 255, 255, 0.25); /* Mocna przezroczystość */
            backdrop-filter: blur(16px);           /* Silne rozmycie tła */
            -webkit-backdrop-filter: blur(16px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.6); /* Błysk na krawędzi szkła */
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        
        input { 
            flex-grow: 1; padding: 12px 16px; 
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid transparent; border-radius: 8px; 
            font-size: 15px; outline: none; transition: all 0.3s;
        }
        input:focus { background: white; box-shadow: 0 0 0 2px rgba(189, 195, 199, 0.5); }
        
        .add-btn { 
            background: #34495e; color: white; border: none; 
            border-radius: 8px; padding: 0 28px; font-size: 15px; font-weight: 500;
            cursor: pointer; transition: 0.2s;
        }
        .add-btn:hover { background: #2c3e50; }

        /* PRAWDZIWE SZKŁO dla kolumn (Przezroczyste kontenery) */
        .board { display: flex; gap: 24px; width: 100%; max-width: 1200px; align-items: flex-start; }
        
        .column { 
            background: rgba(255, 255, 255, 0.25); /* Mocna przezroczystość (25%) */
            backdrop-filter: blur(16px);           /* Efekt matowego szkła */
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6); /* Jasna, szklana ramka */
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
            border-radius: 16px; width: 33.333%; 
            padding: 20px; min-height: 500px;
            display: flex; flex-direction: column;
        }
        
        .column h3 { 
            margin: 0 0 20px 0; font-size: 14px; color: #576574; 
            text-transform: uppercase; letter-spacing: 1.5px;
            font-weight: 600; text-align: center;
        }
        
        .task-list { flex-grow: 1; min-height: 100px; }

        /* Karta zadania - solidna na przezroczystym tle */
        .task { 
            background: rgba(255, 255, 255, 0.95); padding: 16px; margin-bottom: 12px; 
            border-radius: 10px; cursor: grab;
            box-shadow: 0 4px 6px rgba(0,0,0,0.04);
            display: flex; justify-content: space-between; align-items: center;
            transition: all 0.2s; border-left: 4px solid transparent;
        }
        .task:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0,0,0,0.08); }
        .task.dragging { opacity: 0.5; transform: scale(0.95); }
        .task-title { font-weight: 500; font-size: 14px; color: #2f3542; }

        /* Dyskretne kolory statusów */
        .status-todo { border-left-color: #b2bec3; }
        .status-in-progress { background-color: #f8fbff; border-left-color: #74b9ff; }
        .status-done { background-color: #f9fbf9; border-left-color: #55efc4; opacity: 0.8; }
        .status-done .task-title { text-decoration: line-through; color: #a4b0be; }

        /* Przycisk usuwania */
        .delete-btn { 
            background: transparent; color: #ced6e0; border: none; 
            font-size: 18px; cursor: pointer; transition: 0.2s;
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .delete-btn:hover { color: #ff7675; background: #fff1f2; }
    </style>
</head>
<body>
    <h1>Moj Task Tracker</h1>

    <div class="add-form">
        <input type="text" id="taskInput" placeholder="Co mamy dzisiaj do zrobienia?" onkeypress="handleKeyPress(event)">
        <button class="add-btn" onclick="addTask()">Dodaj</button>
    </div>

    <div class="board">
        <div class="column">
            <h3>Do zrobienia</h3>
            <div class="task-list" id="todo-list" data-status="todo"></div>
        </div>
        <div class="column">
            <h3>W trakcie</h3>
            <div class="task-list" id="in-progress-list" data-status="in-progress"></div>
        </div>
        <div class="column">
            <h3>Gotowe</h3>
            <div class="task-list" id="done-list" data-status="done"></div>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000/tasks";

        async function fetchTasks() {
            const response = await fetch(API_URL);
            const tasks = await response.json();
            document.getElementById('todo-list').innerHTML = '';
            document.getElementById('in-progress-list').innerHTML = '';
            document.getElementById('done-list').innerHTML = '';
            tasks.forEach(task => renderTask(task));
        }

        function renderTask(task) {
            const taskElement = document.createElement('div');
            taskElement.className = `task status-${task.status}`;
            taskElement.draggable = true;
            taskElement.ondragstart = (e) => {
                e.dataTransfer.setData('taskId', task.id);
                setTimeout(() => taskElement.classList.add('dragging'), 0);
            };
            taskElement.ondragend = () => taskElement.classList.remove('dragging');
            taskElement.innerHTML = `
                <div class="task-title">${task.title}</div>
                <button class="delete-btn" onclick="deleteTask(${task.id})">✖</button>
            `;
            document.getElementById(`${task.status}-list`).appendChild(taskElement);
        }

        async function addTask() {
            const input = document.getElementById('taskInput');
            if (!input.value.trim()) return;
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: input.value, status: "todo" })
            });
            input.value = '';
            fetchTasks();
        }

        function handleKeyPress(e) { if (e.key === 'Enter') addTask(); }

        async function updateTask(id, newStatus) {
            await fetch(`${API_URL}/${id}?status=${newStatus}`, { method: 'PUT' });
            fetchTasks();
        }

        async function deleteTask(id) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            fetchTasks();
        }

        function setupDragAndDrop() {
            const lists = document.querySelectorAll('.task-list');
            lists.forEach(list => {
                list.ondragover = (e) => e.preventDefault();
                list.ondrop = (e) => {
                    const taskId = e.dataTransfer.getData('taskId');
                    const newStatus = list.getAttribute('data-status');
                    updateTask(taskId, newStatus);
                };
            });
        }

        fetchTasks();
        setupDragAndDrop();
    </script>
</body>
</html>
